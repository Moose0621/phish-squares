name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      api-image: ${{ steps.tags.outputs.api-image }}
      web-image: ${{ steps.tags.outputs.web-image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          echo "api-image=$ACR_LOGIN_SERVER/phish-squares-api:${SHA}" >> "$GITHUB_OUTPUT"
          echo "web-image=$ACR_LOGIN_SERVER/phish-squares-web:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push API image
        run: |
          docker build --target api \
            -t "$ACR_LOGIN_SERVER/phish-squares-api:${{ github.sha }}" \
            -t "$ACR_LOGIN_SERVER/phish-squares-api:latest" .
          docker push "$ACR_LOGIN_SERVER/phish-squares-api:${{ github.sha }}"
          docker push "$ACR_LOGIN_SERVER/phish-squares-api:latest"

      - name: Build and push Web image
        run: |
          docker build --target web \
            --build-arg VITE_API_URL=${{ secrets.API_URL }} \
            -t "$ACR_LOGIN_SERVER/phish-squares-web:${{ github.sha }}" \
            -t "$ACR_LOGIN_SERVER/phish-squares-web:latest" .
          docker push "$ACR_LOGIN_SERVER/phish-squares-web:${{ github.sha }}"
          docker push "$ACR_LOGIN_SERVER/phish-squares-web:latest"

  migrate:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --workspace=packages/shared --workspace=apps/api
      - run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-api:
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: phishsquares-api
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ needs.build-and-push.outputs.api-image }}

  deploy-web:
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-api]
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Web to Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: phishsquares-web
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ needs.build-and-push.outputs.web-image }}
